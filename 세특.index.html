<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세특 탐구 로드맵 빌더</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f8f8f7; --bg3: #f0efea;
  --text: #1a1a18; --text2: #6b6b67; --text3: #9b9b97;
  --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
  --accent: #4F6EF7; --accent2: #7C3AED;
  --radius: 10px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2c;s
    --text: #e8e8e4; --text2: #9b9b97; --text3: #6b6b67;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
  }
}

html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; user-select: none; }

#app { display: flex; flex-direction: column; height: 100vh; }

/* ===== TOOLBAR ===== */
#toolbar {
  display: flex; align-items: center; gap: 8px; padding: 10px 16px;
  border-bottom: 0.5px solid var(--border); background: var(--bg2);
  flex-shrink: 0; flex-wrap: wrap; z-index: 100;
}
.tb-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.tb-sep { width: 0.5px; height: 22px; background: var(--border2); margin: 0 4px; }
.tb-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: 7px;
  border: 0.5px solid var(--border2); background: var(--bg);
  font-size: 12px; color: var(--text2); cursor: pointer;
  font-family: inherit; transition: all .15s; white-space: nowrap;
}
.tb-btn:hover { background: var(--bg3); color: var(--text); }
.tb-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.tb-btn i { font-size: 15px; }
.tb-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }
.tb-hint { font-size: 11px; color: var(--text3); }
.tb-tag { font-size: 10px; padding: 2px 8px; border-radius: 99px; background: var(--bg3); color: var(--text2); }

/* ===== CANVAS ===== */
#canvas-wrap {
  flex: 1; position: relative; overflow: hidden; cursor: default;
  background-image: radial-gradient(circle, var(--text3) 1px, transparent 1px);
  background-size: 28px 28px;
  background-color: var(--bg3);
}
#canvas-wrap.panning { cursor: grab; }
#canvas-wrap.panning:active { cursor: grabbing; }

#canvas { position: absolute; top: 0; left: 0; width: 3200px; height: 3200px; transform-origin: 0 0; }

#svg-layer {
  position: absolute; top: 0; left: 0; width: 3200px; height: 3200px;
  pointer-events: none; overflow: visible;
}

/* ===== NODES ===== */
.node {
  position: absolute; width: 168px;
  border-radius: 13px; border: 1.5px solid;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 12px 14px 10px; cursor: pointer; z-index: 10;
  transition: box-shadow .2s, transform .15s;
  text-align: center; backdrop-filter: blur(4px);
}
.node:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.12); z-index: 20; }
.node.selected { z-index: 30; box-shadow: 0 0 0 3px rgba(79,110,247,.45), 0 8px 24px rgba(0,0,0,.15) !important; }
.node.dragging { z-index: 50; cursor: grabbing; transition: none; transform: scale(1.03); }

.node-icon { font-size: 20px; margin-bottom: 5px; pointer-events: none; }
.node-label { font-size: 12px; font-weight: 700; line-height: 1.4; word-break: keep-all; pointer-events: none; }
.node-sub { font-size: 10px; margin-top: 3px; opacity: .7; line-height: 1.3; pointer-events: none; word-break: keep-all; }
.node-badge {
  font-size: 9px; padding: 2px 8px; border-radius: 99px;
  margin-top: 6px; pointer-events: none; font-weight: 500; letter-spacing: .3px;
}

/* ===== PORTS ===== */
.port {
  position: absolute; width: 13px; height: 13px;
  border-radius: 50%; border: 2.5px solid white;
  background: var(--accent); opacity: 0;
  transition: opacity .15s, transform .15s;
  cursor: crosshair; z-index: 40;
}
.node:hover .port, .node.selected .port { opacity: 1; }
.port:hover { transform: scale(1.5) !important; background: var(--accent2); }
.port.top    { top: -7px;    left: 50%;  transform: translateX(-50%); }
.port.bottom { bottom: -7px; left: 50%;  transform: translateX(-50%); }
.port.left   { left: -7px;   top:  50%;  transform: translateY(-50%); }
.port.right  { right: -7px;  top:  50%;  transform: translateY(-50%); }

/* ===== CONNECTIONS ===== */
.conn-line { stroke-width: 2.2; fill: none; marker-end: url(#arrow-head); transition: stroke-width .15s; }
.conn-group { cursor: pointer; }
.conn-group:hover .conn-line { stroke-width: 3.5; }
.conn-delete { opacity: 0; transition: opacity .2s; cursor: pointer; }
.conn-group:hover .conn-delete { opacity: 1; }

#temp-line { stroke: var(--accent2); stroke-width: 2; stroke-dasharray: 7 4; fill: none; }

/* ===== PANELS ===== */
#edit-panel {
  position: fixed; top: 64px; right: 16px; width: 230px;
  background: var(--bg); border: 0.5px solid var(--border2);
  border-radius: 12px; padding: 16px; z-index: 200; display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,.15);
  animation: slideIn .15s ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } }
#edit-panel.open { display: block; }
.ep-title { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; }
.ep-field { margin-bottom: 9px; }
.ep-label { font-size: 10px; color: var(--text2); margin-bottom: 4px; display: block; font-weight: 500; }
.ep-input {
  width: 100%; padding: 7px 10px; border-radius: 7px;
  border: 0.5px solid var(--border2); background: var(--bg2);
  font-size: 12px; color: var(--text); font-family: inherit; outline: none;
}
.ep-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79,110,247,.15); }
.ep-colors { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 3px; }
.ep-color { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2.5px solid transparent; transition: all .15s; }
.ep-color:hover { transform: scale(1.1); }
.ep-color.active { border-color: var(--text); transform: scale(1.15); }
.ep-actions { display: flex; gap: 6px; margin-top: 12px; }
.ep-btn {
  flex: 1; padding: 7px; border-radius: 7px; border: 0.5px solid var(--border2);
  background: var(--bg2); font-size: 11px; color: var(--text2);
  cursor: pointer; font-family: inherit; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 4px;
}
.ep-btn:hover { background: var(--bg3); }
.ep-btn.danger { color: #ef4444; border-color: #ef4444; }
.ep-btn.danger:hover { background: rgba(239,68,68,.08); }

/* ===== LEGEND ===== */
#legend { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
.leg-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text2); }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ===== ZOOM CONTROLS ===== */
#zoom-ctrl {
  position: fixed; bottom: 20px; left: 20px;
  display: flex; flex-direction: column; align-items: center; gap: 4px; z-index: 100;
}
.z-btn {
  width: 30px; height: 30px; border-radius: 7px;
  border: 0.5px solid var(--border2); background: var(--bg);
  font-size: 15px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; color: var(--text2);
  transition: all .15s;
}
.z-btn:hover { background: var(--bg2); color: var(--text); }
#zoom-label { font-size: 10px; color: var(--text2); font-weight: 500; }

/* ===== MINIMAP ===== */
#minimap {
  position: fixed; bottom: 20px; right: 20px;
  width: 140px; height: 90px; background: var(--bg2);
  border: 0.5px solid var(--border2); border-radius: 9px;
  overflow: hidden; z-index: 100;
}
#minimap-canvas { width: 100%; height: 100%; }
#minimap-vp {
  position: absolute; border: 1.5px solid var(--accent);
  border-radius: 3px; background: rgba(79,110,247,.08);
  pointer-events: none;
}

/* ===== TOAST ===== */
#toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg); padding: 7px 18px;
  border-radius: 99px; font-size: 12px; z-index: 500;
  opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; }

/* ===== CONTEXT MENU ===== */
#ctx-menu {
  position: fixed; background: var(--bg); border: 0.5px solid var(--border2);
  border-radius: 9px; padding: 6px; z-index: 400; display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,.15); min-width: 160px;
}
#ctx-menu.open { display: block; }
.ctx-item {
  display: flex; align-items: center; gap: 8px; padding: 7px 10px;
  border-radius: 6px; cursor: pointer; font-size: 12px; color: var(--text2);
  transition: background .1s;
}
.ctx-item:hover { background: var(--bg2); color: var(--text); }
.ctx-item i { font-size: 14px; }
.ctx-item.danger { color: #ef4444; }
.ctx-item.danger:hover { background: rgba(239,68,68,.08); }
.ctx-sep { height: 0.5px; background: var(--border); margin: 4px 0; }

/* ===== INTRO ===== */
#intro {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--bg); border: 0.5px solid var(--border2);
  border-radius: 99px; padding: 8px 20px;
  font-size: 11px; color: var(--text2); z-index: 50;
  display: flex; gap: 16px; align-items: center;
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
  white-space: nowrap; animation: floatUp 3s ease forwards;
}
@keyframes floatUp { 0%{opacity:0;transform:translateX(-50%) translateY(8px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 80%{opacity:1} 100%{opacity:0} }
.intro-tip { display: flex; align-items: center; gap: 5px; }
.intro-tip i { font-size: 13px; }

</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span class="tb-title">🗺 세특 탐구 로드맵</span>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="addNode()"><i class="ti ti-plus"></i> 노드 추가</button>
    <button class="tb-btn" id="btn-connect" onclick="toggleConnectMode()"><i class="ti ti-arrow-right"></i> 연결 모드</button>
    <button class="tb-btn" id="btn-pan" onclick="togglePanMode()"><i class="ti ti-hand-grab"></i> 이동 모드</button>
    <div class="tb-sep"></div>
    <div id="legend"></div>
    <div class="tb-right">
      <button class="tb-btn" onclick="exportPNG()"><i class="ti ti-download"></i> 내보내기</button>
      <button class="tb-btn" onclick="resetView()"><i class="ti ti-arrows-maximize"></i></button>
      <button class="tb-btn" onclick="clearAll()" style="color:#ef4444"><i class="ti ti-trash"></i> 초기화</button>
    </div>
  </div>

  <div id="canvas-wrap" id="cw">
    <div id="canvas">
      <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrow-head" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M1.5 2L8.5 5L1.5 8" fill="none" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round" stroke="context-stroke"/>
          </marker>
        </defs>
        <line id="temp-line" x1="0" y1="0" x2="0" y2="0" style="display:none"/>
        <g id="conn-layer"></g>
      </svg>
    </div>

    <!-- Minimap -->
    <div id="minimap">
      <canvas id="minimap-canvas"></canvas>
      <div id="minimap-vp"></div>
    </div>

    <!-- Zoom controls -->
    <div id="zoom-ctrl">
      <button class="z-btn" onclick="zoom(0.15)"><i class="ti ti-plus"></i></button>
      <span id="zoom-label">100%</span>
      <button class="z-btn" onclick="zoom(-0.15)"><i class="ti ti-minus"></i></button>
      <button class="z-btn" onclick="resetView()" title="화면 맞추기"><i class="ti ti-arrows-maximize"></i></button>
    </div>
  </div>
</div>

<!-- Edit Panel -->
<div id="edit-panel">
  <div class="ep-title">노드 편집</div>
  <div class="ep-field">
    <label class="ep-label">제목</label>
    <input class="ep-input" id="ep-label" placeholder="탐구 주제..." oninput="updateField('label')">
  </div>
  <div class="ep-field">
    <label class="ep-label">부제목</label>
    <input class="ep-input" id="ep-sub" placeholder="세부 내용..." oninput="updateField('sub')">
  </div>
  <div class="ep-field">
    <label class="ep-label">과목</label>
    <input class="ep-input" id="ep-subject" placeholder="예) 수학, 물리학, 화학..." oninput="updateField('subject')">
  </div>
  <div class="ep-field">
    <label class="ep-label">유형</label>
    <input class="ep-input" id="ep-type" placeholder="예) 탐구 동기, 가설 설정..." oninput="updateField('type')">
  </div>
  <div class="ep-field">
    <label class="ep-label">색상 테마</label>
    <div class="ep-colors" id="ep-colors"></div>
  </div>
  <div class="ep-actions">
    <button class="ep-btn" onclick="duplicateNode()"><i class="ti ti-copy"></i> 복제</button>
    <button class="ep-btn danger" onclick="deleteSelectedNode()"><i class="ti ti-trash"></i> 삭제</button>
  </div>
</div>

<!-- Context Menu -->
<div id="ctx-menu">
  <div class="ctx-item" onclick="ctxAddChild()"><i class="ti ti-arrow-fork"></i> 하위 노드 추가</div>
  <div class="ctx-item" onclick="duplicateNode(); closeCtx()"><i class="ti ti-copy"></i> 노드 복제</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="deleteSelectedNode(); closeCtx()"><i class="ti ti-trash"></i> 노드 삭제</div>
</div>

<div id="toast"></div>
<div id="intro">
  <div class="intro-tip"><i class="ti ti-hand-grab"></i> 드래그로 이동</div>
  <div class="intro-tip"><i class="ti ti-point"></i> 흰 점으로 연결</div>
  <div class="intro-tip"><i class="ti ti-mouse-2"></i> 우클릭으로 더 보기</div>
  <div class="intro-tip"><i class="ti ti-arrows-maximize"></i> 스크롤로 줌</div>
</div>

<script>
const PALETTE = [
  { bg:'#EEF2FF', border:'#6366F1', text:'#3730A3', badge:'#C7D2FE' },
  { bg:'#F0FDF4', border:'#22C55E', text:'#15803D', badge:'#BBF7D0' },
  { bg:'#FFF7ED', border:'#F97316', text:'#C2410C', badge:'#FED7AA' },
  { bg:'#FDF4FF', border:'#A855F7', text:'#7E22CE', badge:'#E9D5FF' },
  { bg:'#FFF1F2', border:'#F43F5E', text:'#BE123C', badge:'#FFE4E6' },
  { bg:'#F0F9FF', border:'#0EA5E9', text:'#0369A1', badge:'#BAE6FD' },
  { bg:'#FFFBEB', border:'#EAB308', text:'#A16207', badge:'#FEF08A' },
  { bg:'#F0FDFA', border:'#14B8A6', text:'#0F766E', badge:'#99F6E4' },
];
const PALETTE_DARK = [
  { bg:'#1E1B4B', border:'#818CF8', text:'#C7D2FE', badge:'#3730A3' },
  { bg:'#052E16', border:'#4ADE80', text:'#BBF7D0', badge:'#166534' },
  { bg:'#431407', border:'#FB923C', text:'#FED7AA', badge:'#7C2D12' },
  { bg:'#3B0764', border:'#C084FC', text:'#E9D5FF', badge:'#6B21A8' },
  { bg:'#4C0519', border:'#FB7185', text:'#FFE4E6', badge:'#9F1239' },
  { bg:'#082F49', border:'#38BDF8', text:'#BAE6FD', badge:'#075985' },
  { bg:'#422006', border:'#FACC15', text:'#FEF08A', badge:'#854D0E' },
  { bg:'#042F2E', border:'#2DD4BF', text:'#99F6E4', badge:'#134E4A' },
];
function getP() { return window.matchMedia('(prefers-color-scheme:dark)').matches ? PALETTE_DARK : PALETTE; }

const ICONS = { '탐구 동기':'🔍','가설 설정':'💡','자료 수집':'📊','실험 설계':'🔬','데이터 분석':'📈','결론 도출':'✅','심화 탐구':'🚀','한계 및 제언':'⚠️','기타':'📌' };

let nodes=[], conns=[], selectedId=null;
let scale=1, tx=120, ty=80;
let isPanMode=false, isConnectMode=false;
let nodeCounter=0, connCounter=0;
let ctxTargetId=null;

const wrap = document.getElementById('canvas-wrap');
const canvas = document.getElementById('canvas');
const connLayer = document.getElementById('conn-layer');
const tempLine = document.getElementById('temp-line');
const editPanel = document.getElementById('edit-panel');
const ctxMenu = document.getElementById('ctx-menu');

/* ───────────── INIT ───────────── */
function init() {
  buildPaletteDots();
  // Sample roadmap
  const n1 = addNodeAt(180, 150, '탐구 동기', '수학적 패턴에 대한 호기심', '수학', 0, '탐구 동기');
  const n2 = addNodeAt(460, 80,  '가설 설정', '피보나치 수열과 자연 현상의 연관성', '수학', 1, '가설 설정');
  const n3 = addNodeAt(460, 230, '선행 연구', '관련 논문 및 문헌 조사', '수학', 5, '자료 수집');
  const n4 = addNodeAt(740, 155, '데이터 수집', '식물 잎의 배열 측정', '생명과학', 2, '자료 수집');
  const n5 = addNodeAt(1010, 80, '통계 분석', '상관계수 및 회귀분석', '수학', 6, '데이터 분석');
  const n6 = addNodeAt(1010, 240,'시각화',    '그래프 및 다이어그램', '정보', 3, '데이터 분석');
  const n7 = addNodeAt(1280, 155,'결론 도출', '가설 검증 및 새로운 통찰', '수학', 0, '결론 도출');
  const n8 = addNodeAt(1280, 310,'한계 및 제언','표본 수 한계·후속 탐구', '기타', 4, '한계 및 제언');

  setTimeout(() => {
    [
      [n1,n2],[n1,n3],
      [n2,n4],[n3,n4],
      [n4,n5],[n4,n6],
      [n5,n7],[n6,n7],
      [n7,n8]
    ].forEach(([a,b]) => connectNodes(a,b));
    renderConnections();
    updateMinimap();
  }, 30);

  applyTransform();
  updateLegend();
}

function buildPaletteDots() {
  const ec = document.getElementById('ep-colors');
  ec.innerHTML = '';
  getP().forEach((c,i) => {
    const d = document.createElement('div');
    d.className = 'ep-color';
    d.style.background = c.border;
    d.dataset.ci = i;
    d.onclick = () => { setNodeColor(selectedId, i); buildPaletteDots(); };
    ec.appendChild(d);
  });
}

/* ───────────── NODE CREATION ───────────── */
function addNode() {
  const ci = Math.floor(Math.random()*8);
  const cx = (wrap.offsetWidth/2 - tx)/scale - 84;
  const cy = (wrap.offsetHeight/2 - ty)/scale - 50;
  const id = addNodeAt(cx, cy, '새 탐구 주제', '내용을 입력하세요', '기타', ci, '기타');
  selectNode(id);
  toast('새 노드가 추가되었습니다');
  updateMinimap();
}

function addNodeAt(x,y,label,sub,subject,ci,type) {
  const id = 'n'+(++nodeCounter);
  nodes.push({id,x,y,label,sub,subject,ci,type:type||'기타'});
  renderNode(id);
  updateLegend();
  return id;
}

/* ───────────── NODE RENDER ───────────── */
function renderNode(id) {
  const n = nodes.find(x=>x.id===id); if(!n) return;
  const C = getP()[n.ci];
  let el = document.getElementById(id);
  const icon = ICONS[n.type]||'📌';

  if (!el) {
    el = document.createElement('div');
    el.id = id; el.className = 'node';
    el.innerHTML = `
      <div class="port top"    data-id="${id}" data-port="top"></div>
      <div class="port bottom" data-id="${id}" data-port="bottom"></div>
      <div class="port left"   data-id="${id}" data-port="left"></div>
      <div class="port right"  data-id="${id}" data-port="right"></div>
      <div class="node-icon"   id="${id}-icon"></div>
      <div class="node-label"  id="${id}-label"></div>
      <div class="node-sub"    id="${id}-sub"></div>
      <div class="node-badge"  id="${id}-badge"></div>
    `;
    canvas.appendChild(el);
    setupNodeEvents(el, n);
  }

  el.style.left   = n.x+'px';
  el.style.top    = n.y+'px';
  el.style.background   = C.bg;
  el.style.borderColor  = C.border;
  el.style.color        = C.text;

  document.getElementById(id+'-icon').textContent  = icon;
  document.getElementById(id+'-label').textContent = n.label;
  document.getElementById(id+'-sub').textContent   = n.sub;
  const badge = document.getElementById(id+'-badge');
  badge.textContent = n.subject;
  badge.style.background = C.badge;
  badge.style.color      = C.text;
}

function setupNodeEvents(el, n) {
  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('port')) return;
    if (isPanMode) return;
    e.stopPropagation(); e.preventDefault();
    selectNode(n.id);
    const nd = nodes.find(x=>x.id===n.id);
    const ox=nd.x, oy=nd.y;
    const sx=e.clientX, sy=e.clientY;
    let moved=false;
    const onMove = ev => {
      const dx=(ev.clientX-sx)/scale, dy=(ev.clientY-sy)/scale;
      if(Math.abs(dx)+Math.abs(dy)>3) moved=true;
      nd.x=ox+dx; nd.y=oy+dy;
      el.style.left=nd.x+'px'; el.style.top=nd.y+'px';
      el.classList.add('dragging');
      renderConnections(); updateMinimap();
    };
    const onUp=()=>{ document.removeEventListener('mousemove',onMove); el.classList.remove('dragging'); };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp,{once:true});
  });

  el.addEventListener('contextmenu', e => {
    e.preventDefault(); e.stopPropagation();
    selectNode(n.id);
    ctxTargetId = n.id;
    ctxMenu.style.left = e.clientX+'px';
    ctxMenu.style.top  = e.clientY+'px';
    ctxMenu.classList.add('open');
  });

  // Port drag for connections
  el.querySelectorAll('.port').forEach(port => {
    port.addEventListener('mousedown', e => {
      e.stopPropagation(); e.preventDefault();
      const rect = port.getBoundingClientRect();
      const wRect = wrap.getBoundingClientRect();
      const sx = (rect.left+rect.width/2-wRect.left-tx)/scale;
      const sy = (rect.top+rect.height/2-wRect.top-ty)/scale;
      tempLine.setAttribute('x1',sx); tempLine.setAttribute('y1',sy);
      tempLine.setAttribute('x2',sx); tempLine.setAttribute('y2',sy);
      tempLine.style.display='';
      const onM = ev => {
        const mx=(ev.clientX-wRect.left-tx)/scale;
        const my=(ev.clientY-wRect.top-ty)/scale;
        tempLine.setAttribute('x2',mx); tempLine.setAttribute('y2',my);
      };
      document.addEventListener('mousemove',onM);
      document.addEventListener('mouseup',ev=>{
        document.removeEventListener('mousemove',onM);
        tempLine.style.display='none';
        const t=document.elementFromPoint(ev.clientX,ev.clientY);
        if(t&&t.classList.contains('port')&&t.dataset.id!==n.id){
          connectNodes(n.id,t.dataset.id);
          renderConnections(); updateMinimap();
        }
      },{once:true});
    });
  });
}

/* ───────────── CONNECTIONS ───────────── */
function connectNodes(fromId, toId) {
  if(conns.find(c=>(c.from===fromId&&c.to===toId)||(c.from===toId&&c.to===fromId))) return;
  const id='c'+(++connCounter);
  conns.push({id,from:fromId,to:toId});
}

function getCenter(id) {
  const n=nodes.find(x=>x.id===id); if(!n) return {x:0,y:0};
  const el=document.getElementById(id);
  return {x:n.x+(el?el.offsetWidth/2:84), y:n.y+(el?el.offsetHeight/2:55)};
}

function renderConnections() {
  connLayer.innerHTML='';
  conns.forEach(c=>{
    const f=getCenter(c.from), t=getCenter(c.to);
    const fromNode=nodes.find(x=>x.id===c.from);
    const C=getP()[fromNode?fromNode.ci:0];
    const dx=t.x-f.x, dy=t.y-f.y;
    const mx=(f.x+t.x)/2, my=(f.y+t.y)/2;
    // Bezier curve
    const cpx1=f.x+dx*0.45, cpy1=f.y;
    const cpx2=t.x-dx*0.45, cpy2=t.y;
    const d=`M${f.x},${f.y} C${cpx1},${cpy1} ${cpx2},${cpy2} ${t.x},${t.y}`;

    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.className.baseVal='conn-group'; g.dataset.id=c.id;

    // Hit area
    const hit=document.createElementNS('http://www.w3.org/2000/svg','path');
    hit.setAttribute('d',d); hit.setAttribute('fill','none');
    hit.setAttribute('stroke','transparent'); hit.setAttribute('stroke-width','14');
    g.appendChild(hit);

    // Visible line
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',d); path.setAttribute('class','conn-line');
    path.setAttribute('stroke',C.border);
    path.setAttribute('marker-end','url(#arrow-head)');
    g.appendChild(path);

    // Delete button
    const dg=document.createElementNS('http://www.w3.org/2000/svg','g');
    dg.className.baseVal='conn-delete';
    dg.setAttribute('transform',`translate(${mx},${my})`);
    dg.innerHTML=`<circle r="9" fill="#ef4444" stroke="white" stroke-width="2"/>
      <text x="0" y="4.5" text-anchor="middle" style="font-size:13px;fill:white;font-weight:700;pointer-events:none">×</text>`;
    dg.style.pointerEvents='all';
    dg.addEventListener('click',e=>{e.stopPropagation();deleteConn(c.id);});
    g.appendChild(dg);
    connLayer.appendChild(g);
  });
}

function deleteConn(id) {
  conns=conns.filter(c=>c.id!==id);
  renderConnections(); updateMinimap();
  toast('연결이 삭제되었습니다');
}

/* ───────────── SELECTION & EDITING ───────────── */
function selectNode(id) {
  if(selectedId){const p=document.getElementById(selectedId);if(p)p.classList.remove('selected');}
  selectedId=id;
  closeCtx();
  if(id){
    const el=document.getElementById(id);
    if(el) el.classList.add('selected');
    const n=nodes.find(x=>x.id===id);
    document.getElementById('ep-label').value=n.label;
    document.getElementById('ep-sub').value=n.sub;
    document.getElementById('ep-subject').value=n.subject;
    document.getElementById('ep-type').value=n.type||'기타';
    document.querySelectorAll('.ep-color').forEach((d,i)=>d.classList.toggle('active',i===n.ci));
    editPanel.classList.add('open');
  } else {
    editPanel.classList.remove('open');
  }
}

function updateField(field) {
  if(!selectedId) return;
  const n=nodes.find(x=>x.id===selectedId);
  if(field==='label') n.label=document.getElementById('ep-label').value;
  if(field==='sub')   n.sub  =document.getElementById('ep-sub').value;
  if(field==='subject'){n.subject=document.getElementById('ep-subject').value; updateLegend();}
  if(field==='type')  n.type =document.getElementById('ep-type').value;
  renderNode(selectedId);
  renderConnections();
}

function setNodeColor(id,ci) {
  if(!id) return;
  const n=nodes.find(x=>x.id===id); n.ci=ci;
  renderNode(id); renderConnections();
  document.querySelectorAll('.ep-color').forEach((d,i)=>d.classList.toggle('active',i===ci));
  updateLegend(); updateMinimap();
}

function duplicateNode() {
  if(!selectedId) return;
  const n=nodes.find(x=>x.id===selectedId);
  const newId=addNodeAt(n.x+40,n.y+50,n.label+' (복제)',n.sub,n.subject,n.ci,n.type);
  selectNode(newId); updateMinimap();
  toast('노드가 복제되었습니다');
}

function deleteSelectedNode() {
  if(!selectedId) return;
  conns=conns.filter(c=>c.from!==selectedId&&c.to!==selectedId);
  nodes=nodes.filter(x=>x.id!==selectedId);
  const el=document.getElementById(selectedId);
  if(el) el.remove();
  selectedId=null;
  editPanel.classList.remove('open');
  renderConnections(); updateLegend(); updateMinimap();
  toast('노드가 삭제되었습니다');
}

/* ───────────── CONTEXT MENU ───────────── */
function closeCtx() { ctxMenu.classList.remove('open'); }
function ctxAddChild() {
  if(!ctxTargetId) return;
  const n=nodes.find(x=>x.id===ctxTargetId);
  const newId=addNodeAt(n.x+200,n.y,n.label+' 심화','세부 내용',n.subject,n.ci,'심화 탐구');
  connectNodes(ctxTargetId,newId);
  renderConnections(); selectNode(newId); updateMinimap();
  closeCtx(); toast('하위 노드가 추가되었습니다');
}
document.addEventListener('click',()=>closeCtx());

/* ───────────── MODES ───────────── */
function toggleConnectMode() {
  isConnectMode=!isConnectMode; isPanMode=false;
  document.getElementById('btn-connect').classList.toggle('active',isConnectMode);
  document.getElementById('btn-pan').classList.remove('active');
  wrap.classList.toggle('connecting',isConnectMode);
  wrap.classList.remove('panning');
}
function togglePanMode() {
  isPanMode=!isPanMode; isConnectMode=false;
  document.getElementById('btn-pan').classList.toggle('active',isPanMode);
  document.getElementById('btn-connect').classList.remove('active');
  wrap.classList.toggle('panning',isPanMode);
  wrap.classList.remove('connecting');
}

/* ───────────── PAN & ZOOM ───────────── */
let panStart=null;
wrap.addEventListener('mousedown',e=>{
  if(isPanMode||e.button===1){
    e.preventDefault();
    panStart={x:e.clientX-tx,y:e.clientY-ty};
    const onM=ev=>{tx=ev.clientX-panStart.x;ty=ev.clientY-panStart.y;applyTransform();updateMinimap();};
    document.addEventListener('mousemove',onM);
    document.addEventListener('mouseup',()=>document.removeEventListener('mousemove',onM),{once:true});
  } else if(!e.target.closest('.node')&&!e.target.closest('#conn-layer')&&!e.target.closest('#edit-panel')&&!e.target.closest('#ctx-menu')){
    selectNode(null);
  }
});

wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const delta=e.deltaY>0?-0.1:0.1;
  const r=wrap.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const wx=(mx-tx)/scale, wy=(my-ty)/scale;
  scale=Math.min(2.5,Math.max(0.2,scale+delta));
  tx=mx-wx*scale; ty=my-wy*scale;
  applyTransform(); updateMinimap();
},{passive:false});

function zoom(d){ scale=Math.min(2.5,Math.max(0.2,scale+d)); applyTransform(); updateMinimap(); }
function applyTransform(){
  canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  document.getElementById('zoom-label').textContent=Math.round(scale*100)+'%';
  updateMinimapVp();
}

function resetView() {
  if(nodes.length===0){scale=1;tx=120;ty=80;applyTransform();return;}
  const xs=nodes.map(n=>n.x), ys=nodes.map(n=>n.y);
  const minX=Math.min(...xs)-20, minY=Math.min(...ys)-20;
  const maxX=Math.max(...xs)+200, maxY=Math.max(...ys)+130;
  const pw=wrap.offsetWidth, ph=wrap.offsetHeight;
  scale=Math.min(pw/(maxX-minX),ph/(maxY-minY))*0.88;
  scale=Math.min(1.5,Math.max(0.2,scale));
  tx=pw/2-(minX+(maxX-minX)/2)*scale;
  ty=ph/2-(minY+(maxY-minY)/2)*scale;
  applyTransform();
}

/* ───────────── LEGEND ───────────── */
function updateLegend() {
  const subs=[...new Set(nodes.map(n=>n.subject))];
  const subMap={};
  nodes.forEach(n=>subMap[n.subject]=n.ci);
  document.getElementById('legend').innerHTML=subs.map(s=>{
    const C=getP()[subMap[s]||0];
    return `<div class="leg-item"><div class="leg-dot" style="background:${C.border}"></div>${s}</div>`;
  }).join('');
}

/* ───────────── MINIMAP ───────────── */
function updateMinimap() {
  const mc=document.getElementById('minimap-canvas');
  const ctx=mc.getContext('2d');
  mc.width=140; mc.height=90;
  ctx.clearRect(0,0,140,90);
  if(nodes.length===0) return;
  const xs=nodes.map(n=>n.x), ys=nodes.map(n=>n.y);
  const minX=Math.min(...xs)-30, minY=Math.min(...ys)-30;
  const maxX=Math.max(...xs)+200, maxY=Math.max(...ys)+130;
  const sc=Math.min(120/(maxX-minX),70/(maxY-minY));
  const ox=10, oy=10;
  conns.forEach(c=>{
    const f=nodes.find(x=>x.id===c.from), t=nodes.find(x=>x.id===c.to);
    if(!f||!t) return;
    const fn=nodes.find(x=>x.id===c.from);
    const C=getP()[fn?fn.ci:0];
    ctx.strokeStyle=C.border+'88'; ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo((f.x+84-minX)*sc+ox,(f.y+55-minY)*sc+oy);
    ctx.lineTo((t.x+84-minX)*sc+ox,(t.y+55-minY)*sc+oy);
    ctx.stroke();
  });
  nodes.forEach(n=>{
    const C=getP()[n.ci];
    ctx.fillStyle=C.border;
    const rx=(n.x-minX)*sc+ox, ry=(n.y-minY)*sc+oy;
    const rw=168*sc, rh=72*sc;
    ctx.beginPath();
    ctx.roundRect(rx,ry,rw,rh,3);
    ctx.fill();
  });
  updateMinimapVp(minX,minY,sc,ox,oy);
}

let _mmParams={minX:0,minY:0,sc:0.04,ox:10,oy:10};
function updateMinimapVp(minX,minY,sc,ox,oy){
  if(minX!==undefined) _mmParams={minX,minY,sc,ox,oy};
  const {minX:mx,minY:my,sc:s,ox:x0,oy:y0}=_mmParams;
  const vw=wrap.offsetWidth/scale, vh=wrap.offsetHeight/scale;
  const vx=(-tx/scale-mx)*s+x0, vy=(-ty/scale-my)*s+y0;
  const vp=document.getElementById('minimap-vp');
  vp.style.left=Math.max(0,vx)+'px'; vp.style.top=Math.max(0,vy)+'px';
  vp.style.width=(vw*s)+'px'; vp.style.height=(vh*s)+'px';
}

/* ───────────── CLEAR ───────────── */
function clearAll(){
  if(!confirm('모든 노드와 연결을 초기화하시겠습니까?')) return;
  nodes.forEach(n=>{const e=document.getElementById(n.id);if(e)e.remove();});
  nodes=[]; conns=[]; selectedId=null;
  connLayer.innerHTML='';
  editPanel.classList.remove('open');
  updateLegend(); updateMinimap();
  toast('초기화되었습니다');
}

/* ───────────── EXPORT ───────────── */
function exportPNG(){
  toast('브라우저 인쇄(Ctrl+P)를 사용하거나 스크린샷을 찍어보세요');
}

/* ───────────── KEYBOARD ───────────── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){if(isConnectMode)toggleConnectMode();selectNode(null);}
  if((e.key==='Delete'||e.key==='Backspace')&&selectedId&&!e.target.matches('input,select,textarea')){
    deleteSelectedNode();
  }
  if(e.key==='+'&&(e.ctrlKey||e.metaKey)){e.preventDefault();zoom(0.1);}
  if(e.key==='-'&&(e.ctrlKey||e.metaKey)){e.preventDefault();zoom(-0.1);}
  if(e.key==='0'&&(e.ctrlKey||e.metaKey)){e.preventDefault();resetView();}
});

/* ───────────── TOAST ───────────── */
let toastTimer;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

init();
</script>
